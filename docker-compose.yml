services:
  pgaudix:
    build: .
    container_name: pgaudix
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pgaudix_dev
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./:/pgaudix

volumes:
  pgdata:
