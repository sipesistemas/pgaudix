name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pg_version: [18, 17, 16]

    container:
      image: postgres:${{ matrix.pg_version }}
      env:
        POSTGRES_HOST_AUTH_METHOD: trust

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential postgresql-server-dev-${{ matrix.pg_version }}

      - name: Build and install extension
        run: make USE_PGXS=1 && make USE_PGXS=1 install

      - name: Start PostgreSQL and run tests
        run: |
          su postgres -c "pg_ctl -D /tmp/pgdata initdb"
          su postgres -c "pg_ctl -D /tmp/pgdata -l /tmp/pg.log start"
          su postgres -c "make USE_PGXS=1 installcheck"

      - name: Show test diff on failure
        if: failure()
        run: |
          cat regression.diffs || true
