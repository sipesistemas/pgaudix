name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pg_version: [18, 17]

    container:
      image: postgres:${{ matrix.pg_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential postgresql-server-dev-${{ matrix.pg_version }}

      - name: Build and install extension
        run: make USE_PGXS=1 && make USE_PGXS=1 install

      - name: Run tests
        run: |
          chown -R postgres:postgres .
          su postgres -c "pg_ctl -D /tmp/pgdata initdb"
          su postgres -c "pg_ctl -D /tmp/pgdata -l /tmp/pg.log start"
          su postgres -c "make USE_PGXS=1 installcheck"

      - name: Package release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIST="pgaudix-${VERSION}-pg${{ matrix.pg_version }}-linux-amd64"
          mkdir "$DIST"
          cp pgaudix.so pgaudix.control pgaudix--*.sql install.sh "$DIST/"
          chmod +x "$DIST/install.sh"
          tar czf "${DIST}.tar.gz" "$DIST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgaudix-pg${{ matrix.pg_version }}-linux-amd64
          path: pgaudix-*-linux-amd64.tar.gz

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with PostgreSQL
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-postgresql
            make
            zip

      - name: Build extension
        shell: msys2 {0}
        run: |
          PG_VERSION=$(pg_config --version | grep -oP '\d+')
          echo "Building for PostgreSQL $PG_VERSION"
          make USE_PGXS=1

      - name: Package release
        shell: msys2 {0}
        run: |
          PG_VERSION=$(pg_config --version | grep -oP '\d+')
          VERSION="${GITHUB_REF_NAME#v}"
          DIST="pgaudix-${VERSION}-pg${PG_VERSION}-windows-amd64"
          mkdir "$DIST"
          # Copy the built shared library (could be .dll or .so depending on MSYS2 PG build)
          SHLIB=$(ls pgaudix.dll pgaudix.so 2>/dev/null | head -1)
          echo "Found shared library: $SHLIB"
          cp "$SHLIB" "$DIST/pgaudix.dll"
          cp pgaudix.control pgaudix--*.sql install.bat "$DIST/"
          zip -r "${DIST}.zip" "$DIST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgaudix-windows-amd64
          path: pgaudix-*-windows-amd64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "pgaudix ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            dist/*
